name: Build Paper

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-bibtex-extra latexmk
      - name: Build paper PDF
        run: make
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: gauge-oracle-paper
          path: paper/main.pdf
